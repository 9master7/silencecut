<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — SilenceCut Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="light">

<div class="auth-wrap">
  <div id="loginCard" class="auth-card">
    <div class="auth-logo">● SilenceCut<span style="color:var(--accent)">Pro</span></div>
    <h2>Welcome back</h2>
    <p class="auth-sub">Log in to clean your audio.</p>

    <!-- GOOGLE LOGIN -->
    <button onclick="googleLogin()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:11px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--ink);font-size:14px;font-weight:500;cursor:pointer;font-family:Inter,sans-serif;margin-bottom:1rem;transition:all .2s" onmouseover="this.style.borderColor='#4285f4'" onmouseout="this.style.borderColor='var(--border)'">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or use email</span></div>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Your password">
    </div>
    <button class="btn-primary form-btn" onclick="emailLogin()">Log in</button>

    <div class="auth-switch" style="margin-top:1rem">Don't have an account? <a href="#" onclick="showSignup()">Sign up free</a></div>
  </div>

  <div id="signupCard" class="auth-card" style="display:none">
    <div class="auth-logo">● SilenceCut<span style="color:var(--accent)">Pro</span></div>
    <h2>Create account</h2>
    <p class="auth-sub">Start with 3 free audio cleanups.</p>

    <!-- GOOGLE SIGNUP -->
    <button onclick="googleLogin()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:11px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--ink);font-size:14px;font-weight:500;cursor:pointer;font-family:Inter,sans-serif;margin-bottom:1rem;transition:all .2s" onmouseover="this.style.borderColor='#4285f4'" onmouseout="this.style.borderColor='var(--border)'">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign up with Google
    </button>

    <div class="auth-divider"><span>or use email</span></div>

    <div class="form-group">
      <label>Full name</label>
      <input type="text" id="signupName" placeholder="Your name">
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="signupEmail" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Min 8 characters">
    </div>
    <button class="btn-primary form-btn" onclick="emailSignup()">Create free account</button>

    <div class="auth-switch" style="margin-top:1rem">Already have an account? <a href="#" onclick="showLogin()">Log in</a></div>
    <p style="font-size:11px;color:var(--ink3);text-align:center;margin-top:.75rem">By signing up you agree to our <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>.</p>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBeyFUhTm5M5dEMi87tIL4msuFtrCbc80A",
    authDomain: "silencecutpro.firebaseapp.com",
    projectId: "silencecutpro",
    storageBucket: "silencecutpro.firebasestorage.app",
    messagingSenderId: "314976670189",
    appId: "1:314976670189:web:ac7c6ec8c1cfd864f657e4",
    measurementId: "G-3PX0F51N2E"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // Check if already logged in
  onAuthStateChanged(auth, (user) => {
    if (user) {
      localStorage.setItem('sc_user', JSON.stringify({
        uid: user.uid,
        email: user.email,
        name: user.displayName || user.email,
        photo: user.photoURL || '',
        plan: JSON.parse(localStorage.getItem('sc_user') || '{}').plan || 'free'
      }));
      window.location.href = 'dashboard.html';
    }
  });

  // Google Login
  window.googleLogin = async function() {
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      localStorage.setItem('sc_user', JSON.stringify({
        uid: user.uid,
        email: user.email,
        name: user.displayName,
        photo: user.photoURL,
        plan: JSON.parse(localStorage.getItem('sc_user') || '{}').plan || 'free'
      }));
      showToast('Welcome ' + user.displayName + '! 🎉', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    } catch (e) {
      showToast('Google login failed: ' + e.message, 'error');
    }
  };

  // Email Login
  window.emailLogin = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value;
    if (!email || !pass) { showToast('Please fill in all fields.', 'error'); return; }
    try {
      const result = await signInWithEmailAndPassword(auth, email, pass);
      const user = result.user;
      localStorage.setItem('sc_user', JSON.stringify({
        uid: user.uid, email: user.email,
        name: user.displayName || email,
        plan: JSON.parse(localStorage.getItem('sc_user') || '{}').plan || 'free'
      }));
      showToast('Welcome back!', 'success');
    } catch (e) {
      if (e.code === 'auth/invalid-credential') showToast('Invalid email or password.', 'error');
      else showToast(e.message, 'error');
    }
  };

  // Email Signup
  window.emailSignup = async function() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const pass = document.getElementById('signupPassword').value;
    if (!name || !email || !pass) { showToast('Please fill in all fields.', 'error'); return; }
    if (pass.length < 8) { showToast('Password must be at least 8 characters.', 'error'); return; }
    try {
      const result = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(result.user, { displayName: name });
      localStorage.setItem('sc_user', JSON.stringify({
        uid: result.user.uid, email, name, plan: 'free'
      }));
      showToast('Account created! Welcome 🎉', 'success');
    } catch (e) {
      if (e.code === 'auth/email-already-in-use') showToast('Email already registered. Please log in.', 'error');
      else showToast(e.message, 'error');
    }
  };
</script>

<script src="js/main.js"></script>
<script>
function showSignup() {
  document.getElementById('loginCard').style.display = 'none';
  document.getElementById('signupCard').style.display = 'block';
}
function showLogin() {
  document.getElementById('signupCard').style.display = 'none';
  document.getElementById('loginCard').style.display = 'block';
}
</script>
</body>
</html>
